<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Signup | GIF Cropper Pro</title>
    <!-- Poppins Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/static/favicon.png">
    <style>
        :root {
            --primary: #9b2c2c;
            --primary-light: #c53030;
            --gradient: linear-gradient(135deg, #a52862, #7a1d48);
            --bg-glass: rgba(255, 255, 255, 0.95);
            --text-dark: #2d3748;
            --text-muted: #718096;
            --input-bg: #f7fafc;
            --border: #e2e8f0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: #f0f2f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: #4a0e2a;
            /* Fallback */
            background: linear-gradient(45deg, #4a0e2a, #821045);
        }

        /* Animated Background Shapes */
        .bg-shapes {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .shape {
            position: absolute;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            animation: float 20s infinite linear;
        }

        .shape-1 {
            width: 400px;
            height: 400px;
            top: -100px;
            left: -100px;
        }

        .shape-2 {
            width: 300px;
            height: 300px;
            bottom: -50px;
            right: -50px;
        }

        .shape-3 {
            width: 150px;
            height: 150px;
            top: 20%;
            right: 15%;
            animation-duration: 15s;
        }

        @keyframes float {
            0% {
                transform: translateY(0) rotate(0);
            }

            50% {
                transform: translateY(-50px) rotate(180deg);
            }

            100% {
                transform: translateY(0) rotate(360deg);
            }
        }

        .container {
            width: 900px;
            max-width: 95%;
            height: 600px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            display: flex;
            position: relative;
            z-index: 10;
            overflow: hidden;
            transition: all 0.5s ease;
        }

        /* Left Branding Section */
        .branding {
            flex: 1;
            background: var(--gradient);
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            position: relative;
            transition: transform 0.6s ease-in-out;
        }

        .branding-content {
            text-align: center;
            z-index: 2;
        }

        .branding h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            font-weight: 700;
        }

        .branding p {
            font-size: 1rem;
            opacity: 0.9;
            line-height: 1.6;
        }

        /* Diagonal shapes in branding side */
        .branding::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(110deg, rgba(255, 255, 255, 0.1) 0%, rgba(255, 255, 255, 0) 40%, rgba(255, 255, 255, 0.05) 60%, rgba(255, 255, 255, 0) 100%);
            z-index: 1;
        }

        /* Right Form Section */
        .forms-container {
            flex: 1.5;
            background: white;
            position: relative;
            transition: transform 0.6s ease-in-out;
            padding: 60px;
            display: flex;
            flex-direction: column;
        }

        .logo-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 30px;
        }

        .logo-circle {
            width: 80px;
            height: 80px;
            background: #fdf2f8;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #fecdd3;
            margin-bottom: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
        }

        .logo-circle i {
            font-size: 40px;
            color: #d81b60;
        }

        .form-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: #4a0e2a;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .input-group {
            margin-bottom: 20px;
            position: relative;
        }

        .input-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            transition: color 0.3s;
        }

        .input-group input {
            width: 100%;
            padding: 15px 45px 15px 45px;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: var(--input-bg);
            outline: none;
            font-size: 0.9rem;
            transition: all 0.3s;
        }

        .input-group input:focus {
            border-color: #d81b60;
            background: white;
            box-shadow: 0 0 10px rgba(216, 27, 96, 0.1);
        }

        .input-group input:focus+i:not(.toggle-password) {
            color: #d81b60;
        }

        .toggle-password {
            position: absolute;
            right: 15px !important;
            left: auto !important;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: var(--text-muted);
            transition: color 0.3s;
        }

        .toggle-password:hover {
            color: #d81b60;
        }

        .forgot-password {
            text-align: right;
            margin-top: -10px;
            margin-bottom: 20px;
        }

        .forgot-password a {
            font-size: 0.8rem;
            color: #d81b60;
            text-decoration: none;
            transition: opacity 0.3s;
        }

        .forgot-password a:hover {
            text-decoration: underline;
        }

        .btn-primary {
            width: 100%;
            padding: 15px;
            background: #d81b60;
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 5px 15px rgba(216, 27, 96, 0.3);
        }

        .btn-primary:hover {
            background: #ad1457;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(216, 27, 96, 0.4);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 25px 0;
            color: var(--text-muted);
            font-size: 0.8rem;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .divider span {
            padding: 0 15px;
        }

        .social-login {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 10px 20px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: white;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s;
            color: var(--text-dark);
        }

        .social-btn:hover {
            background: var(--input-bg);
            transform: translateY(-2px);
        }

        .social-btn i {
            font-size: 1.2rem;
        }

        .social-btn.google i {
            color: #DB4437;
        }

        .social-btn.facebook i {
            color: #4267B2;
        }

        /* Switching States */
        #form-signup {
            display: none;
        }

        .toggle-section {
            text-align: center;
            margin-top: 30px;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .toggle-section span {
            color: #d81b60;
            font-weight: 600;
            cursor: pointer;
            transition: color 0.3s;
        }

        .toggle-section span:hover {
            text-decoration: underline;
        }

        /* Animations for switching */
        .fade-in {
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Loader */
        .loader {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            display: none;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="bg-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <div class="container">
        <!-- Branding Section (Left) -->
        <div class="branding">
            <div class="branding-content" id="brandingContent">
                <h1 id="brandTitle">Welcome Back!</h1>
                <p id="brandDesc" style="margin-bottom: 30px;">Login to access your high-speed GIF cropping tools and
                    manage your projects with ease.</p>

                <div style="display: flex; justify-content: center; gap: 15px; margin-bottom: 30px;">
                    <button id="tab-login" onclick="toggleForm('login')"
                        style="padding: 10px 30px; border-radius: 8px; border: none; font-weight: 600; cursor: pointer; transition: 0.3s; background: white; color: #4a0e2a;">
                        LOGIN
                    </button>
                    <button id="tab-signup" onclick="toggleForm('signup')"
                        style="padding: 10px 30px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.5); font-weight: 600; cursor: pointer; transition: 0.3s; background: transparent; color: white;">
                        SIGN UP
                    </button>
                </div>

                <div
                    style="margin-top: auto; font-size: 0.9rem; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 20px;">
                    <p style="margin-bottom: 5px;">Made by <strong>Khan Dev</strong></p>
                    <p style="margin-bottom: 5px;"><i class="fas fa-globe"></i> <a href="https://khandevhub.netlify.app"
                            target="_blank" style="color: white; text-decoration: none;">khandevhub.netlify.app</a></p>
                    <p><i class="fab fa-whatsapp"></i> +92 349 1887803</p>
                </div>
            </div>
        </div>

        <!-- Form Section (Right) -->
        <div class="forms-container">
            <!-- Login Form -->
            <div id="form-login" class="fade-in">
                <div class="logo-section">
                    <div class="logo-circle">
                        <i class="fas fa-user-circle"></i>
                    </div>
                    <h2 class="form-title">Login</h2>
                </div>

                <form id="loginForm">
                    <div class="input-group">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="loginEmail" placeholder="Email" required>
                    </div>
                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="loginPassword" placeholder="Password" required>
                        <i class="fas fa-eye toggle-password"
                            onclick="togglePasswordVisibility('loginPassword', this)"></i>
                    </div>
                    <div class="forgot-password">
                        <a href="javascript:void(0)" onclick="handleForgotPassword()">Forgot Password??</a>
                    </div>
                    <button type="submit" class="btn-primary" id="loginBtn">
                        <span id="loginText">Login</span>
                        <div class="loader" id="loginLoader"></div>
                    </button>
                </form>



                <div class="toggle-section">
                    Don't have an account? <span onclick="toggleForm('signup')">Sign Up</span>
                </div>
            </div>

            <!-- Signup Form -->
            <div id="form-signup" class="fade-in">
                <div class="logo-section">
                    <div class="logo-circle">
                        <i class="fas fa-user-plus"></i>
                    </div>
                    <h2 class="form-title">Create Account</h2>
                </div>

                <form id="signupForm">
                    <div class="input-group">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="signupEmail" placeholder="Email" required>
                    </div>
                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="signupPassword" placeholder="Password" required>
                        <i class="fas fa-eye toggle-password"
                            onclick="togglePasswordVisibility('signupPassword', this)"></i>
                    </div>
                    <div class="input-group">
                        <i class="fas fa-shield-alt"></i>
                        <input type="password" id="signupConfirm" placeholder="Confirm Password" required>
                        <i class="fas fa-eye toggle-password"
                            onclick="togglePasswordVisibility('signupConfirm', this)"></i>
                    </div>
                    <button type="submit" class="btn-primary" id="signupBtn">
                        <span id="signupText">Sign Up</span>
                        <div class="loader" id="signupLoader"></div>
                    </button>
                </form>

                <div class="toggle-section">
                    Already have an account? <span onclick="toggleForm('login')">Login</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/static/js/auth.js?v=3"></script>

    <script>
        function toggleForm(type) {
            const loginForm = document.getElementById('form-login');
            const signupForm = document.getElementById('form-signup');
            const brandingH1 = document.getElementById('brandTitle');
            const brandingP = document.getElementById('brandDesc');
            const loginTab = document.getElementById('tab-login');
            const signupTab = document.getElementById('tab-signup');

            if (type === 'signup') {
                loginForm.style.display = 'none';
                signupForm.style.display = 'flex';
                signupForm.style.flexDirection = 'column';
                brandingH1.innerText = 'Join Us!';
                brandingP.innerText = 'Create an account to start cropping and organizing your GIF assets professionally.';

                // Tab styles
                loginTab.style.background = 'transparent';
                loginTab.style.color = 'white';
                loginTab.style.border = '1px solid rgba(255,255,255,0.5)';

                signupTab.style.background = 'white';
                signupTab.style.color = '#4a0e2a';
                signupTab.style.border = 'none';
            } else {
                signupForm.style.display = 'none';
                loginForm.style.display = 'flex';
                loginForm.style.flexDirection = 'column';
                brandingH1.innerText = 'Welcome Back!';
                brandingP.innerText = 'Login to access your high-speed GIF cropping tools and manage your projects with ease.';

                // Tab styles
                signupTab.style.background = 'transparent';
                signupTab.style.color = 'white';
                signupTab.style.border = '1px solid rgba(255,255,255,0.5)';

                loginTab.style.background = 'white';
                loginTab.style.color = '#4a0e2a';
                loginTab.style.border = 'none';
            }

        }

        function togglePasswordVisibility(inputId, iconElement) {
            const input = document.getElementById(inputId);
            if (input.type === 'password') {
                input.type = 'text';
                iconElement.classList.remove('fa-eye');
                iconElement.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                iconElement.classList.remove('fa-eye-slash');
                iconElement.classList.add('fa-eye');
            }
        }
    </script>
</body>

</html>
