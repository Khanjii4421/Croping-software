<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khalil Khan </title>
    <!-- Poppins Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <!-- Cropper.js CSS -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/css/style.css?v=2">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/static/favicon.png">
</head>

<body class="light-theme">
    <!-- Glowing background elements for Glassmorphism -->
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>
    <div class="bg-glow bg-glow-3"></div>

    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">
                <div class="logo-inner">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M4 4H20V20H4V4Z" stroke="var(--primary-color)" stroke-width="2"
                            stroke-linejoin="round" />
                        <path d="M8 8H16V16H8V8Z" fill="var(--primary-color)" opacity="0.5" />
                        <path d="M4 12H20M12 4V20" stroke="var(--primary-color)" stroke-width="2"
                            stroke-linejoin="round" stroke-dasharray="4 4" />
                    </svg>
                    <div style="display: flex; flex-direction: column;">
                        <h2 style="font-size: 1.1rem; line-height: 1;">Khan Dev</h2>
                        <small style="font-size: 0.65rem; color: var(--text-muted); opacity: 0.8;">Professional
                            Tool</small>
                    </div>
                </div>
            </div>

            <div class="upload-section">
                <!-- Old Method Checkbox -->
                <div style="margin-bottom: 12px; display: flex; align-items: center; gap: 10px; padding: 10px; background: var(--card-bg); border: 1px solid var(--panel-border); border-radius: 8px;">
                    <input type="checkbox" id="oldMethodCheckbox" style="display: none;" />
                    <label for="oldMethodCheckbox" class="checkbox-label" style="display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 0.9rem; font-weight: 500; user-select: none;">
                        <span class="custom-checkbox" style="width: 18px; height: 18px; border: 2px solid var(--primary-color); border-radius: 4px; display: inline-flex; align-items: center; justify-content: center; transition: all 0.2s;">
                            <i class="fas fa-check" style="font-size: 0.7rem; color: transparent; transition: all 0.2s;"></i>
                        </span>
                        Old Method
                    </label>
                </div>

                <!-- Folder Upload -->
                <input type="file" id="folderInput" webkitdirectory directory multiple accept="image/gif"
                    style="display:none;" />
                <label for="folderInput" class="upload-btn" style="margin-bottom: 10px; display: flex;">
                    <i class="fas fa-folder-open"></i> Upload Folder
                </label>
            </div>

            <div class="upload-section" style="margin-top: 5px;">
                <label style="font-size: 0.8rem; color: var(--text-muted); margin-bottom: 5px; display: block;">Custom
                    Save Folder (Optional):</label>
                <button id="selectOutputDirBtn" class="secondary-btn"
                    style="width: 100%; padding: 8px; font-size: 0.8rem; justify-content: center;">
                    <i class="fas fa-folder"></i> Choose Save Folder
                </button>
                <div id="outputPathDisplay"
                    style="font-size: 0.75rem; color: var(--accent-l); margin-top: 5px; word-break: break-all; text-align: center;">
                    No folder chosen (Downloads locally)</div>
            </div>

            <div class="status-panel">
                <div class="status-item">
                    <span>Total GIFs:</span>
                    <strong id="totalGifs">0</strong>
                </div>
                <div class="status-item">
                    <span>Completed:</span>
                    <strong id="completedGifs" style="color:var(--accent-l)">0</strong>
                </div>
                <div class="status-item">
                    <span>Remaining:</span>
                    <strong id="remainingGifs" style="color:var(--accent-r)">0</strong>
                </div>
            </div>

            <div class="current-crop-info">
                <h3>Crop Progress</h3>
                <div class="crop-steps">
                    <!-- Steps logic JS populated -->
                </div>
                <div id="cropTargetName" class="crop-target-name">Ready</div>
            </div>

            <div class="download-section">
                <h3>Completed Archives <span id="downloadCount"
                        style="margin-left:8px; background:var(--primary-color); padding:2px 8px; border-radius:10px; font-size:0.8rem;">0</span>
                </h3>
                <div id="downloadLinks" class="download-links">
                    <!-- Download links appear here -->
                </div>
                <button id="btnFinalize" class="primary-btn"
                    style="margin-top:15px; width:100%; display:none;">
                    <i class="fas fa-box"></i> Pack All to Master RAR
                </button>
            </div>

            <div class="sidebar-footer"
                style="margin-top: auto; padding-top: 15px; border-top: 1px solid var(--panel-border); display: flex; flex-direction: column; gap: 10px;">
                <div id="lastCropContainer"
                    style="display:none; text-align: center; background: rgba(0,0,0,0.05); padding: 10px; border-radius: 8px;">
                    <small style="color: var(--text-muted); display:block; margin-bottom:5px;">Last Cropped:</small>
                    <img id="lastCropImg" src="" style="max-height: 80px; max-width: 100%; border-radius: 4px;">
                </div>
                <button id="resetAppBtn" class="logout-sidebar-btn">
                    <i class="fas fa-trash-alt"></i> Reset Software
                </button>
            </div>
        </aside>

        <!-- Sidebar Toggle -->
        <div class="sidebar-toggle-btn" id="sidebarToggle" title="Toggle Sidebar">
            <i class="fas fa-chevron-left" id="sidebarToggleIcon"></i>
        </div>

        <!-- Main Content -->
        <main class="main-content">
            <div class="header">
                <div style="display:flex; align-items:center; gap: 15px;">
                    <button id="themeToggle" class="theme-toggle" title="Toggle Light/Dark Mode">
                        <i class="fas fa-sun" id="themeIcon"></i>
                    </button>
                    <h1 id="currentFileName">Welcome! Upload a folder to begin</h1>
                </div>
                <div class="actions">
                    <button id="btnUndo" class="secondary-btn undo-btn" title="Undo Last Crop" disabled>
                        <i class="fas fa-undo"></i> Undo
                    </button>
                    <button id="btnCrop" class="primary-btn" disabled>
                        <i class="fas fa-cut"></i> Next Cropped <span id="nextCropLabel">R1</span> (Enter)
                    </button>
                    <button id="btnSkip" class="secondary-btn" title="Skip current GIF" disabled>
                        <i class="fas fa-forward"></i> Skip
                    </button>
                </div>
            </div>

            <div class="workspace">
                <div class="image-container glass-container" id="imageContainer"
                    style="box-shadow: 0 20px 40px rgba(0,0,0,0.1); border-radius: 20px; transition: 0.5s;">
                    <div class="placeholder-content animated-placeholder" style="text-align:center;">
                        <div class="placeholder-icon-wrap" style="margin-bottom: 20px;">
                            <i class="fas fa-images fa-4x pulse-icon"
                                style="color: var(--primary-color); text-shadow: 0 0 20px rgba(216,27,96,0.3);"></i>
                        </div>
                        <h2 class="placeholder-text" style="font-weight: 700; color: var(--text-main);">Drop your GIFs
                            here!</h2>
                        <p style="font-size:1.1rem; margin-top:15px; color: var(--text-muted);">
                            Upload a Folder from the sidebar to launch auto-extraction.
                        </p>
                    </div>
                    <img id="image" src="" alt="Picture"
                        style="max-width: 100%; display: none; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.2);">
                </div>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="/static/js/auth.js?v=2"></script>
    <script src="/static/js/app.js?v=4"></script>
</body>

</html>
