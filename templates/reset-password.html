<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | GIF Cropper Pro</title>
    <!-- Poppins Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="icon" type="image/png" href="/static/favicon.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: #f0f2f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(45deg, #4a0e2a, #821045);
        }

        .container {
            width: 450px;
            max-width: 95%;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        .container h2 {
            color: #4a0e2a;
            margin-bottom: 10px;
        }

        .container p {
            color: #718096;
            font-size: 0.9rem;
            margin-bottom: 25px;
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        .input-group input {
            width: 100%;
            padding: 12px 40px 12px 15px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            outline: none;
            transition: 0.3s;
        }

        .input-group input:focus {
            border-color: #d81b60;
            box-shadow: 0 0 8px rgba(216, 27, 96, 0.1);
        }

        .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #718096;
            transition: color 0.3s;
        }

        .toggle-password:hover {
            color: #d81b60;
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: #d81b60;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            background: #ad1457;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>Reset Your Password</h2>
        <p>Enter your new password below to update your account.</p>
        <form id="resetForm">
            <div class="input-group">
                <input type="password" id="newPassword" placeholder="New Password" required minlength="6">
                <i class="fas fa-eye toggle-password" onclick="togglePasswordVisibility('newPassword', this)"></i>
            </div>
            <div class="input-group">
                <input type="password" id="confirmPassword" placeholder="Confirm New Password" required minlength="6">
                <i class="fas fa-eye toggle-password" onclick="togglePasswordVisibility('confirmPassword', this)"></i>
            </div>
            <button type="submit" class="btn" id="updateBtn">Update Password</button>
        </form>
        <div style="margin-top: 20px;">
            <a href="/login" style="color: #718096; text-decoration: none; font-size: 0.85rem;">Back to Login</a>
        </div>
    </div>

    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/static/js/auth.js?v=3"></script>

    <script>
        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const pass = document.getElementById('newPassword').value;
            const conf = document.getElementById('confirmPassword').value;

            if (pass !== conf) {
                return Swal.fire('Error', 'Passwords do not match.', 'error');
            }

            const btn = document.getElementById('updateBtn');
            btn.disabled = true;
            btn.innerText = "Updating...";

            if (!supabaseClient) {
                Swal.fire('Error', 'Supabase missing', 'error');
                return;
            }

            try {
                // If user clicks from email, they have an active hash/session.
                // We just call updateUser to set new password.
                const { error } = await supabaseClient.auth.updateUser({
                    password: pass
                });

                if (error) throw error;

                Swal.fire({
                    icon: 'success',
                    title: 'Success!',
                    text: 'Your password has been updated. You can now login.',
                    confirmButtonText: 'Go to Login'
                }).then(() => {
                    window.location.href = '/login';
                });

            } catch (err) {
                Swal.fire('Error', err.message, 'error');
            } finally {
                btn.disabled = false;
                btn.innerText = "Update Password";
            }
        });

        function togglePasswordVisibility(inputId, iconElement) {
            const input = document.getElementById(inputId);
            if (input.type === 'password') {
                input.type = 'text';
                iconElement.classList.remove('fa-eye');
                iconElement.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                iconElement.classList.remove('fa-eye-slash');
                iconElement.classList.add('fa-eye');
            }
        }
    </script>
</body>

</html>
